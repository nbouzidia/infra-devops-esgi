name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:2.25.0-pg17
        env:
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
          POSTGRES_DB: meteodb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DEBUG: "false"
      SECRET_KEY: ci-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        run: |
          cd backend
          uv sync --locked --extra dev

      - name: Apply migrations
        run: |
          cd backend
          uv run python manage.py migrate --noinput

      - name: Run backend tests
        run: |
          cd backend
          mkdir -p reports
          uv run pytest --junitxml=reports/pytest-report.xml -vv

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/reports/pytest-report.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        run: |
          cd backend
          uv sync --locked --extra dev

      - name: Run backend linter
        run: |
          cd backend
          uv run ruff check .
          uv run ruff format --check .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Run frontend linter
        run: |
          cd frontend
          npm run lint

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        run: |
          cd backend
          uv sync --locked --extra dev

      - name: Run Bandit (static security scan)
        run: |
          cd backend
          mkdir -p reports
          uv run --with bandit bandit -r weather -f json -o reports/bandit-report.json || true

      - name: Run pip-audit (dependency security scan)
        run: |
          cd backend
          uv run --with pip-audit pip-audit --format=json --output=reports/pip-audit-report.json || true

      - name: Upload security scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: |
            backend/reports/bandit-report.json
            backend/reports/pip-audit-report.json

  docker-build-push:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs: [backend-test, lint, security-scan]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: vars
        run: |
          echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}-backend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}-backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}-frontend:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}-frontend:latest
