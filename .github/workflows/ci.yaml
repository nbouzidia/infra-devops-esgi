name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  install-dependencies:
    name: Install dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev --frozen

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: uv run pytest

      - name: Lint backend (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Lint frontend (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Security scan (Trivy filesystem)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (backend)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/infra-devops-esgi-backend:${{ github.sha }}

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/infra-devops-esgi-backend:latest
            ghcr.io/${{ github.repository_owner }}/infra-devops-esgi-backend:${{ github.sha }}
